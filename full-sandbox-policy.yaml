version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  claude_code:
    name: claude_code
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: '*'
              path: /**
      - host: statsig.anthropic.com
        port: 443
        rules:
          - allow:
              method: '*'
              path: /**
      - host: sentry.io
        port: 443
        rules:
          - allow:
              method: '*'
              path: /**
    binaries:
      - path: /usr/local/bin/claude
  clawhub:
    name: clawhub
    endpoints:
      - host: clawhub.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /**
          - allow:
              method: POST
              path: /**
    binaries:
      - path: /usr/local/bin/openclaw
  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
      - host: objects.githubusercontent.com
        port: 443
        access: full
    binaries:
      - path: /usr/bin/gh
      - path: /usr/bin/git
      - path: /usr/local/bin/node
  npm_registry:
    name: npm_registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
        access: full
    binaries:
      - path: /usr/local/bin/openclaw
      - path: /usr/local/bin/npm
      - path: /usr/local/bin/node
  nvidia:
    name: nvidia
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: '*'
              path: /**
      - host: inference-api.nvidia.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: '*'
              path: /**
    binaries:
      - path: /usr/local/bin/claude
      - path: /usr/local/bin/openclaw
      - path: /usr/local/bin/node
  openclaw_api:
    name: openclaw_api
    endpoints:
      - host: openclaw.ai
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /**
          - allow:
              method: POST
              path: /**
    binaries:
      - path: /usr/local/bin/openclaw
  openclaw_docs:
    name: openclaw_docs
    endpoints:
      - host: docs.openclaw.ai
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /**
    binaries:
      - path: /usr/local/bin/openclaw
  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /bot*/**
          - allow:
              method: POST
              path: /bot*/**
    binaries:
      - path: /usr/local/bin/node
  prnewswire:
    name: prnewswire
    endpoints:
      - host: www.prnewswire.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /rss/**
    binaries:
      - path: /usr/local/bin/node
  businesswire:
    name: businesswire
    endpoints:
      - host: www.businesswire.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /**
      - host: feed.businesswire.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /rss/**
    binaries:
      - path: /usr/local/bin/node
  globenewswire:
    name: globenewswire
    endpoints:
      - host: www.globenewswire.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /RssFeed/**
    binaries:
      - path: /usr/local/bin/node
  google_news:
    name: google_news
    endpoints:
      - host: news.google.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /rss/**
    binaries:
      - path: /usr/local/bin/node
